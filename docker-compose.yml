#/MATER/docker-compose.yml
version: "3.9"

services:
  mater_be:
    build:
      context: ./MATER_BE
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=wsgi:app
      - FLASK_ENV=development
      - SECRET_KEY=supersecretkey

      # --- Startup smoke tests (optional) ---
      - RUN_SMOKE_TESTS_ON_STARTUP=0
      - PYTHONUNBUFFERED=1
      # If needed, override where the smoke test calls the server:
      # - SMOKE_TEST_BASE_URL=http://localhost:5000
      # If you ever change the seeded user credentials:
      # - SMOKE_TEST_EMAIL=test@test.com
      # - SMOKE_TEST_PASSWORD=test
      - ENTRA_TENANT_ID=
      - ENTRA_CLIENT_ID=
      - ENTRA_CLIENT_SECRET=
      - ENTRA_REDIRECT_URI=http://localhost:5173/entra-callback
      - REDIS_URL=redis://redis:6379/0
      # - DATABASE_URL=postgresql://postgres:postgres@db:5432/mater
    volumes:
      - ./MATER_BE/backend/instance:/app/backend/instance
    depends_on:
      - redis
    networks:
      - mater_network

  mater_fe:
    build:
      context: ./MATER_FE
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./MATER_FE:/app
    depends_on:
      - mater_be
    command: sh -c "npm install && npm run dev"
    networks:
      - mater_network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - mater_network

networks:
  mater_network:
    driver: bridge
